server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: containers
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*.log

    pipeline_stages:
      # Docker json-file format: {"log":"...","stream":"stdout","time":"...","attrs":{"tag":"container-name"}}
      - json:
          expressions:
            output: log
            stream: stream
            time: time
            attrs: attrs

      # Extrae el tag (nombre del contenedor) del campo attrs
      - json:
          expressions:
            container_tag: tag
          source: attrs

      # Extrae el nombre del servicio del tag (valinor-saas-api-1 → api)
      - regex:
          expression: 'valinor-saas-(?P<service>[a-z]+)-\d+'
          source: container_tag

      # Intenta parsear el output como JSON de structlog
      - json:
          expressions:
            level: level
            event: event
            job_id: job_id
            request_id: request_id
          source: output

      - timestamp:
          format: RFC3339Nano
          source: time

      - labels:
          stream:
          service:
          container_tag:
          level:

      - output:
          source: output
