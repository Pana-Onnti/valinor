name: Tests

on:  # VAL-51: CI triggers on master + develop
  push:
    branches:
      - master
      - develop
  pull_request:
    branches:
      - master
      - develop

concurrency:
  group: tests-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-3.11-lint-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-3.11-lint-

      - name: Install lint dependencies
        run: pip install flake8

      - name: Run flake8
        run: flake8 api/ shared/ --max-line-length=120 --extend-ignore=E501,W503

  test:
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y liblapack-dev libblas-dev gfortran

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage and JSON report
        run: |
          pytest tests/ \
            --cov=api --cov=shared --cov=core \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=60 \
            -q --tb=short \
            --junitxml=test-results.xml \
            --json-report --json-report-file=test-report.json

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: false

      - name: Generate coverage badge
        if: matrix.python-version == '3.11' && github.ref == 'refs/heads/master'  # VAL-51
        uses: cicirello/jacoco-badge-generator@v2
        with:
          jacoco-csv-file: coverage.xml
          badges-directory: .github/badges
          generate-coverage-badge: true
          coverage-badge-filename: coverage.svg
        continue-on-error: true

      - name: Test result summary
        if: always()
        run: |
          python - <<'EOF'
          import json, sys, pathlib

          report_path = pathlib.Path("test-report.json")
          if not report_path.exists():
              print("No test-report.json found — skipping summary.")
              sys.exit(0)

          report = json.loads(report_path.read_text())
          summary = report.get("summary", {})
          passed  = summary.get("passed",  0)
          failed  = summary.get("failed",  0)
          errors  = summary.get("errors",  0)
          skipped = summary.get("skipped", 0)
          total   = summary.get("total",   0)
          duration = report.get("duration", 0)

          print(f"\n{'='*50}")
          print(f"  TEST SUMMARY  (Python ${{ matrix.python-version }})")
          print(f"{'='*50}")
          print(f"  Total   : {total}")
          print(f"  Passed  : {passed}")
          print(f"  Failed  : {failed}")
          print(f"  Errors  : {errors}")
          print(f"  Skipped : {skipped}")
          print(f"  Duration: {duration:.2f}s")
          print(f"{'='*50}\n")

          if failed or errors:
              print("Failed / errored tests:")
              for t in report.get("tests", []):
                  if t.get("outcome") in ("failed", "error"):
                      print(f"  - {t['nodeid']}")
          EOF

      - name: Upload test artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.python-version }}
          path: |
            test-results.xml
            test-report.json
            coverage.xml
          retention-days: 14
