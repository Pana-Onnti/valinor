version: '3.8'

services:
  # PostgreSQL for metadata storage (NOT client data)
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: valinor_metadata
      POSTGRES_USER: valinor
      POSTGRES_PASSWORD: dev_password_change_in_prod
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U valinor"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for queues and temporary storage
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API Service
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
      - ~/.ssh:/keys:ro  # Mount SSH keys read-only
    environment:
      - DATABASE_URL=postgresql://valinor:dev_password_change_in_prod@postgres:5432/valinor_metadata
      - REDIS_URL=redis://redis:6379
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-dev_encryption_key_32_chars_long}
      - ENVIRONMENT=development
      - LOG_LEVEL=DEBUG
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  # Celery Worker (for background tasks in dev)
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./:/app
      - ~/.ssh:/keys:ro
    environment:
      - DATABASE_URL=postgresql://valinor:dev_password_change_in_prod@postgres:5432/valinor_metadata
      - REDIS_URL=redis://redis:6379
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-dev_encryption_key_32_chars_long}
      - ENVIRONMENT=development
      - LOG_LEVEL=DEBUG
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A worker.tasks worker --loglevel=info

  # Flower for Celery monitoring
  flower:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379
      - CELERY_RESULT_BACKEND=redis://redis:6379
    depends_on:
      - redis
    command: celery -A worker.tasks flower

  # Demo SSH Server (for testing SSH tunneling)
  ssh-demo:
    image: linuxserver/openssh-server:latest
    ports:
      - "2222:2222"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
      - PUBLIC_KEY_FILE=/keys/demo_rsa.pub
      - USER_NAME=demo
      - PASSWORD_ACCESS=false
    volumes:
      - ./demo/ssh_keys:/keys
      - ./demo/ssh_config:/config
    profiles:
      - demo

  # Demo Database (PostgreSQL for testing)
  demo-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: demo_company
      POSTGRES_USER: readonly
      POSTGRES_PASSWORD: demo_password
    ports:
      - "5433:5432"
    volumes:
      - ./demo/demo_data.sql:/docker-entrypoint-initdb.d/demo_data.sql
    profiles:
      - demo

  # Simple Web Frontend (MVP)
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./web:/app/web
    environment:
      - PYTHONPATH=/app
    command: python serve_web.py
    profiles:
      - mvp

volumes:
  postgres_data:

networks:
  default:
    name: valinor-network